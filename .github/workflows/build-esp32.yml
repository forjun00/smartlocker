name: Build ESP32 firmware

on:
  push:
    branches: [main]
    paths:
      - 'esp32/**'
      - '.github/workflows/build-esp32.yml'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'esp32/**'
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases on tag

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile smartlocker_node sketch
        uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          platforms: |
            - name: esp32:esp32
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
              version: 3.0.7
          libraries: |
            - name: PubSubClient
          sketch-paths: |
            - esp32/smartlocker_node
          cli-compile-flags: |
            - --export-binaries

      - name: Collect firmware binaries
        run: |
          mkdir -p artifacts
          find esp32/smartlocker_node -name '*.bin' -exec cp {} artifacts/ \;
          ls -la artifacts/

      - name: Rename main binary for releases
        run: |
          # Pick the main sketch binary (not the bootloader/partitions)
          if [ -f artifacts/smartlocker_node.ino.bin ]; then
            cp artifacts/smartlocker_node.ino.bin artifacts/firmware.bin
          fi
          ls -la artifacts/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartlocker-firmware-${{ github.sha }}
          path: artifacts/*.bin
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/firmware.bin
            artifacts/smartlocker_node.ino.bin
          generate_release_notes: true
          fail_on_unmatched_files: false
