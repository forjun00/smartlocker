# SmartLocker on nginx + PHP-FPM (the php/ edition).
#
# nginx does NOT read .htaccess — these rules replace php/.htaccess.
# nginx does NOT run PHP — install php-fpm and point fastcgi_pass at it.
#
# Put the php/ folder contents (api.php, index.html, assets/, data/) at `root`.
# Linux: copy to /var/www/smartlocker. Windows: adjust paths + use TCP fastcgi.

server {
    listen 80;
    server_name _;                       # or your domain
    root /var/www/smartlocker;           # folder holding api.php + index.html + assets/ + data/
    index index.html;

    client_max_body_size 2m;

    # --- API -> api.php (PHP-FPM) ---
    # The original /api/... URI is preserved in REQUEST_URI, which api.php parses.
    location /api/ {
        try_files $uri /api.php?$query_string;
    }

    location = /api.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;     # Linux socket
        # fastcgi_pass 127.0.0.1:9000;                  # Windows / TCP FPM
        fastcgi_param SCRIPT_FILENAME $document_root/api.php;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;   # pass admin Bearer token
    }

    # --- never serve the raw JSON storage ---
    location ^~ /data/ { deny all; return 403; }

    # --- static assets + SPA fallback (React Router) ---
    location / {
        try_files $uri /index.html;
    }

    # cache the hashed build assets
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
