# SmartLocker on nginx + the Python/Flask backend (reverse proxy).
#
# nginx serves the built frontend statically and proxies /api to Flask.
# Run Flask behind a production WSGI server, not `python app.py`:
#   Linux:   pip install gunicorn && gunicorn -w 2 -b 127.0.0.1:3001 app:app
#   Windows: pip install waitress && waitress-serve --listen=127.0.0.1:3001 app:app
# (run it from the backend/ folder; keep it alive with systemd / NSSM)

server {
    listen 80;
    server_name _;                                   # or your domain
    root /var/www/smartlocker/frontend/dist;         # the built frontend
    index index.html;

    client_max_body_size 2m;

    # --- API -> Flask (gunicorn/waitress on 3001) ---
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;                       # SMS send waits for the gateway ack
    }

    # --- static assets + SPA fallback ---
    location / {
        try_files $uri /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
